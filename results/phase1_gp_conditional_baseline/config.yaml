experiment:
  name: phase1_gp_conditional_baseline
  output_dir: results/phase1_gp_conditional_baseline
  seed: 42
logging:
  forecast_every: 500
  log_every: 100
  theory_match_every: 500
loss:
  inner_product: true
  lambda_u: 0.5
  lambda_v: 0.5
  type: conditional
modality:
  future_len: 20
  past_len: 50
  sigma_u: 0.05
  sigma_v: 0.0
  start: 0
  type: PastFuture
model:
  bias: false
  embed_dim: 20
  init_logit_scale: 2.659
  type: linear_clip
signal:
  alpha: 2
  dim_true: 1000
  tau: 3.0
  type: gaussian_process_1d
  zero_mean: true
training:
  batch_size: 1024
  lr: 0.0001
  num_steps: 20000
  optimizer: adam
